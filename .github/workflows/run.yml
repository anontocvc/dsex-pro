name: Daily Stock System

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"   # 3 AM UTC (~9 AM BD)

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 IMPORTANT (needed for pull/rebase)

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run your system
      - name: Run Stock System
        run: python scripts/main.py

      # 5. Commit & Push Reports (FIXED ✅)
      - name: Commit & Push Reports
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # 🔥 Pull latest changes first (FIXES YOUR ERROR)
          git pull --rebase origin main || echo "No remote changes"

          # Add ONLY output JSON files
          git add output/*.json || true

          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "📊 auto update daily stock reports"

          # Push safely
          git push origin main