name: Daily Stock System

on:
workflow_dispatch:   # manual run
schedule:
- cron: "0 3 * * *"   # daily at 3 AM UTC (≈9 AM Bangladesh)

jobs:
run:
runs-on: ubuntu-latest

```
steps:
  # 1. Checkout repo
  - name: Checkout code
    uses: actions/checkout@v4
    with:
      persist-credentials: true

  # 2. Setup Python
  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  # 3. Install dependencies
  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  # 4. Run your system
  - name: Run Stock System
    run: python scripts/main.py

  # 5. Commit & push ONLY the report (clean method)
  - name: Commit & Push Report
    run: |
      git config user.name "github-actions"
      git config user.email "actions@github.com"

      git add output/daily-report.json
      git diff --cached --quiet && echo "no changes" || git commit -m "auto update daily report"

      git push
```
